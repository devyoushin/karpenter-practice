apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    metadata:
      labels:
        nodepool: default
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      requirements:
      # On-Demand 인스턴스만 사용
      - key: karpenter.sh/capacity-type
        operator: In
        values: ["on-demand"]

      # 범용(m), 컴퓨팅 최적화(c), 메모리 최적화(r) 패밀리 허용
      - key: karpenter.k8s.aws/instance-category
        operator: In
        values: ["c", "m", "r"]

      # 4세대 이상 인스턴스만 허용
      - key: karpenter.k8s.aws/instance-generation
        operator: Gt
        values: ["3"]

      # x86_64 아키텍처
      - key: kubernetes.io/arch
        operator: In
        values: ["amd64"]

      # Linux OS
      - key: kubernetes.io/os
        operator: In
        values: ["linux"]

  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30s

  # 이 NodePool이 관리할 최대 자원
  limits:
    cpu: "100"
    memory: 400Gi

  # 여러 NodePool 간 우선순위 (낮을수록 On-Demand가 fallback 역할)
  weight: 10
