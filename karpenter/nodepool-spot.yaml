apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: spot
spec:
  template:
    metadata:
      labels:
        nodepool: spot
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      requirements:
      # Spot 인스턴스만 사용
      - key: karpenter.sh/capacity-type
        operator: In
        values: ["spot"]

      # 다양한 인스턴스 타입 허용 (Spot 가용성 극대화)
      - key: karpenter.k8s.aws/instance-category
        operator: In
        values: ["c", "m", "r"]

      # 4세대 이상
      - key: karpenter.k8s.aws/instance-generation
        operator: Gt
        values: ["3"]

      - key: kubernetes.io/arch
        operator: In
        values: ["amd64"]

      - key: kubernetes.io/os
        operator: In
        values: ["linux"]

      # Spot 전용 노드임을 표시하는 Taint
      # Spot을 원하는 Pod는 이 Taint를 Toleration해야 합니다
      taints:
      - key: karpenter.sh/capacity-type
        value: spot
        effect: NoSchedule

  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m

  limits:
    cpu: "200"
    memory: 800Gi

  # Spot NodePool을 On-Demand보다 먼저 시도
  weight: 100
