###############################################################################
# NodePool — Spot 인스턴스 최적화형
# 용도: 배치, ML 학습, 중단 허용 워크로드
# Karpenter v1.2.1 / karpenter.sh/v1
#
# ★ 핵심 원칙: Spot은 다양한 인스턴스 타입 허용 → 가용성 극대화
###############################################################################
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: spot
  annotations:
    nodepool.karpenter.sh/description: "Spot 인스턴스 노드풀 — 비용 최적화 워크로드용"
spec:
  template:
    metadata:
      labels:
        nodepool: spot
        billing: spot
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      requirements:
        # 1) Spot 전용
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"]

        # 2) 넓은 인스턴스 패밀리 허용 → Spot 가용성 증가
        #    c(컴퓨팅), m(범용), r(메모리), t(버스터블) 포함
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m", "r"]

        # 3) 4세대 이상 (Spot 풀이 넓어짐)
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["3"]

        # 4) 너무 작은 인스턴스 제외 (Spot 중단 시 영향 줄이기 위해 적정 크기)
        - key: karpenter.k8s.aws/instance-size
          operator: NotIn
          values: ["nano", "micro", "small", "metal"]

        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]

        - key: kubernetes.io/os
          operator: In
          values: ["linux"]

      # ── Spot 전용 Taint ─────────────────────────────────────────────────────
      # Spot 노드에 Taint → Toleration이 있는 Pod만 스케줄됨
      # Pod에 아래 toleration 추가 필요:
      #   tolerations:
      #   - key: karpenter.sh/capacity-type
      #     value: spot
      #     effect: NoSchedule
      taints:
        - key: karpenter.sh/capacity-type
          value: spot
          effect: NoSchedule

      kubelet:
        maxPods: 110

  disruption:
    # Spot은 적극적 통합 (비용 절감 극대화)
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m

  limits:
    cpu: "200"
    memory: 800Gi

  # Spot을 On-Demand보다 먼저 시도 (weight 높을수록 우선)
  weight: 100
